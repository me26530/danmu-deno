name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/**"
      - "runtime/**"
      - "danmu_api/**"
      - "config/**"
      - "scripts/**"
      - "deno.json"
      - "deno.lock"
      - "package.json"
      - ".github/workflows/deploy-supabase.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_IDS: ${{ secrets.SUPABASE_PROJECT_IDS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.104.0

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Prepare danmu function files
        shell: bash
        run: bash scripts/prepare-supabase-function.sh

      - name: Check Supabase secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is empty" >&2
            exit 1
          fi

          if [ -z "${SUPABASE_PROJECT_IDS:-}" ]; then
            echo "SUPABASE_PROJECT_IDS is empty" >&2
            exit 1
          fi

      - name: Deploy danmu function to all projects
        shell: bash
        run: |
          set -euo pipefail

          for project_ref in $SUPABASE_PROJECT_IDS; do
            echo "Deploying danmu function to $project_ref"
            supabase functions deploy danmu               --project-ref "$project_ref"               --no-verify-jwt               --use-api               --debug
          done
